<!--CSS no existe sin HTML.-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Width y Height</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div>
        <h1>HOLA</h1>
    </div>

    <!-- "div" es como una caja de texto.-->

    <form>
        <input type="text" placeholder="email">
        <input type="password" placeholder="contraseña">
        <input type="button" value="Iniciar sesión">
    </form>

    <!-- En este caso, la caja contenedora es el formulario, es por eso que el input modifica su tamaño -->

    <!-- Al usar un porcentaje, el tamaño del input se ajusta en relación con el tamaño del formulario (90% de 300px = 270px)-->
</body>
</html>
