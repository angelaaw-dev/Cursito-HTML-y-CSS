<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <form>
        <!-- Campos del formulario se inicia con el tag <input> -->
         <input type="text"> <!-- El input se usa para pedir un dato. El atributo "type" se utiliza para especificar el tipo de campo de entrada. En este caso, "text" indica que es un campo de texto donde podemos escribir. -->
         <input type="email"> <!-- "email" nos indicará que este campo es para ingresar una dirección de correo electrónico, donde necesariamente necesita una "@" -->
         <input type="password"> <!-- "password" se utiliza para crear un campo de entrada de contraseña, donde los caracteres ingresados se ocultan. -->
         <input type="checkbox"> <!-- "checkbox" se utiliza para crear una casilla de verificación que permite al usuario seleccionar una o más opciones. -->
         <input type="radio"> <!-- "radio" se utiliza para crear botones de opción que permiten seleccionar una opción de entre varias. -->
         <input type="file"> <!-- permite subir archivos -->
         <input type="date"> <!-- permite seleccionar una fecha -->
         <input type="submit"> <br><!-- "submit" se utiliza para crear un botón que envía el formulario.> -->
         <input type="text" required minlength="3"> <!-- "required" se utiliza para indicar que este campo es obligatorio y "minlength" para especificar la longitud mínima. -->
         <input type="text" name="username"> <!-- "name" se utiliza para asignar un nombre al campo de entrada, lo que es útil para identificarlo cuando se envía el formulario. -->
        <input type="text" placeholder="Your name"> <!-- "placeholder" se utiliza para mostrar un texto de ejemplo dentro del campo de entrada. -->
    </form>
</body>
</html>
